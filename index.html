    content: `<p>الْحُكْمُ إِمَّا طَلَبُ فِعْلٍ أَوْ طَلَبُ تَرْكٍ أَوْ تَخْيِيرٌ بَيْنَهُمَا. فَالْأَوَّلُ — إِنْ كَانَ جَازِمًا فَوُجُوبٌ وَإِلَّا فَنَدْبٌ. وَالثَّانِي — إِنْ كَانَ جَازِمًا فَتَحْرِيمٌ وَإِلَّا فَكَرَاهَةٌ، إِنْ وَرَدَ فِيهِ نَهْيٌ صَرِيحٌ وَخِلَافُ الأُولَى إِنْ كَانَ النَّهْيُ فِيهِ غَيْرُ صَرِيحٍ وَالثَّالِثُ هِيَ الإِبَاحَةُ.</p>
<div class="section-head">الواجب</div>
<p>فَالْوَاجِبُ مَا يُثَابُ عَلَى فِعْلِهِ وَيُعَاقَبُ عَلَى تَرْكِهِ. كَصَوْمِ رَمَضَانَ.</p>

<div class="section-head">الفرض العين والكفاية</div>

<p>إِذَا زَالَتْ هَذِهِ الْمَوَانِعُ — الْكُفْرُ وَالْجُنُونُ وَالصِّبَا وَالْحَيْضُ وَالنِّفَاسُ — وَبَقِيَ مِنَ الْوَقْتِ قَدْرُ تَكْبِيرَةٍ وَجَبَتْ تِلْكَ الصَّلَاةُ وَالَّتِي قَبْلَهَا إِنْ كَانَتْ تُجْمَعُ مَعَهَا.</p>

<p>وُجُوبُ الصَّلَاةِ مَعْلُومٌ مِنَ الدِّينِ بِالضَّرُورَةِ. فَمَنْ جَحَدَهُ فَقَدْ كَفَرَ وَقُتِلَ بِكُفْرِهِ. وَمَنْ أَخْرَجَهَا عَنْ وَقْتِهَا وَوَقْتِ جَمْعِهَا كَسَلًا حَدًّا لَا كُفْرًا فَيُقْتَلُ وَيُغْسَلُ وَيُصَلَّى عَلَيْهِ وَيُدْفَنُ فِي مَقَابِرِ الْمُسْلِمِينَ.</p>
<div class="section-head">الصبي والصلاة</div>
<p>يُؤْمَرُ الصَّبِيُّ الْمُمَيِّزُ بِالصَّلَاةِ بَعْدَ سَبْعٍ، وَيُضْرَبُ عَلَيْهَا بَعْدَ عَشْرٍ لِمَا رَوَى أَبُودَاوُدَ عَنِ النَّبِيِّ صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ: "مُرُوا الصَّبِيَّ بِالصَّلَاةِ إِذَا بَلَغَ سَبْعَ سِنِينَ وَإِذَا بَلَغَ عَشْرًا فَاضْرِبُوهُ عَلَيْهَا".</p>`

<p>الطَّهَارَةُ لُغَةً النَّظَافَةُ. وَشَرْعًا رَفْعُ الْمَنْعِ الْمُتَرَتِّبِ عَلَى الْحَدَثِ أَوِ الْخُبْثِ. وَالْحَدَثُ حَدَثَانِ: حَدَثٌ أَصْغَرُ وَحَدَثٌ أَكْبَرُ. فَالطَّهَارَةُ عَنِ الأَوَّلِ الْوُضُوءُ وَالطَّهَارَةُ عَنِ الثَّانِي الْغُسْلُ.</p>

<p>يُشْتَرَطُ لِكُلِّ طَهَارَةٍ مَاءٌ طَهُورٌ. وَهُوَ الطَّاهِرُ فِي نَفْسِهِ وَالْمُطَهِّرُ لِغَيْرِهِ. وَيُقَالُ لَهُ الْمَاءُ الْمُطْلَقُ. وَهُوَ مَا يَقَعُ عَلَيْهِ اسْمُ الْمَاءِ بِلَا قَيْدٍ كَمَاءِ الْبِحَارِ وَالأَنْهَارِ وَالآبَارِ وَالأَمْطَارِ.</p>

    content: `<p>نَوَاقِضُ الْوُضُوءِ أَرْبَعَةٌ:</p>
<div class="section-head">الناقض الأول: الخروج</div>
<p>خُرُوجُ شَيْءٍ غَيْرِ مَنِيِّهِ مِنْ فَرْجٍ أَوْ تَقْبٍ مِنْ تَحْتِ سُرَّةٍ — وَالْفَرْجُ مُنْسَدٌّ — عَيْنًا كَانَ أَوْ رِيحًا، رَطْبًا أَوْ جَافًّا، مُعْتَادًا أَوْ نَادِرًا. وَالْمَيِّتُ لَا تَنْتَقِضُ طَهَارَتُهُ بِخُرُوجِ شَيْءٍ مِنْهُ.</p>

<div class="section-head">الناقض الثالث: مس الفرج</div>
<p>مَسُّ فَرْجِ آدَمِيٍّ بِبَطْنِ الْكَفِّ — قُبُلًا كَانَ أَوْ دُبُرًا، سَلِيمًا أَوْ أَشَلَّ، مُتَّصِلًا أَوْ مُنْقَطِعًا، وَلَوْ لِمَيِّتٍ أَوْ صَغِيرٍ. وَلَا يَنْتَقِضُ الْوُضُوءُ بِمَسِّ الأُنْثَيَيْنِ وَبَاطِنِ الأَلْيَةِ.</p>
<div class="section-head">الناقض الرابع: لمس المرأة</div>

<li><strong>النِّفَاسُ</strong> — هُوَ دَمٌ مُجْتَمِعٌ يَخْرُجُ بَعْدَ فَرَاغِ الرَّحِمِ مِنَ الْحَمْلِ. أَقَلُّهُ لَحْظَةٌ، وَأَكْثَرُهُ سِتُّونَ يَوْمًا.</li>

    meta: 'صفحة ٤٦-٥٢ — باب التيمم',
    content: `<p>قَالَ اللهُ تَعَالَى: وَإِنْ كُنْتُمْ مَرْضَى أَوْ عَلَى سَفَرٍ أَوْ جَاءَ أَحَدٌ مِنْكُمْ مِنَ الْغَائِطِ أَوْ لَامَسْتُمُ النِّسَاءَ فَلَمْ تَجِدُوا مَاءً فَتَيَمَّمُوا صَعِيدًا طَيِّبًا فَامْسَحُوا بِوُجُوهِكُمْ وَأَيْدِيكُمْ.</p>
<p>التَّيَمُّمُ لُغَةً الْقَصْدُ وَشَرْعًا إِيصَالُ التُّرَابِ إِلَى الْوَجْهِ وَالْيَدَيْنِ بِشُرُوطٍ مَخْصُوصَةٍ. وَشُرِعَ سَنَةَ سِتٍّ مِنَ الْهِجْرَةِ.</p>
<div class="section-head">شروط التيمم</div>
<ol>
<li>الْعَجْزُ عَنِ اسْتِعْمَالِ الْمَاءِ.</li>
<li>أَنْ يُزِيلَ النَّجَاسَةَ أَوَّلًا.</li>
<li>أَنْ يَجْتَهِدَ فِي الْقِبْلَةِ قَبْلَهُ.</li>
<li>أَنْ يَتَيَمَّمَ بَعْدَ دُخُولِ الْوَقْتِ.</li>
<li>أَنْ يَكُونَ بِتُرَابٍ طَهُورٍ لَهُ غُبَارٌ.</li>
<li>أَنْ يَكُونَ بِضَرْبَتَيْنِ: ضَرْبَةٌ لِلْوَجْهِ وَضَرْبَةٌ لِلْيَدَيْنِ.</li>
</ol>
<div class="section-head">أركان التيمم الخمسة</div>
<ol>
<li>نَقْلُ التُّرَابِ.</li>
<li>النِّيَّةُ — نِيَّةُ اسْتِبَاحَةِ صَلَاةٍ مَفْرُوضَةٍ.</li>
<li>مَسْحُ وَجْهِهِ.</li>
<li>مَسْحُ يَدَيْهِ مَعَ مِرْفَقَيْهِ.</li>
<li>التَّرْتِيبُ بَيْنَ الْوَجْهِ وَالْيَدَيْنِ.</li>
</ol>
<div class="section-head">مبطلات التيمم</div>
<ol>
<li>الْحَدَثُ.</li>
<li>الرِّدَّةُ.</li>
<li>تَحَقُّقُ الْبُرْءِ.</li>
<li>تَوَهُّمُ مَاءٍ فِي غَيْرِ الصَّلَاةِ بِلَا مَانِعٍ مِنِ اسْتِعْمَالِهِ.</li>
<li>وُجْدَانُ الْمَاءِ فِي صَلَاةٍ بِالتَّيَمُّمِ بِلَا مَانِعٍ مِنِ اسْتِعْمَالِهِ.</li>
</ol>`

    content: `<p>النَّجَاسَةُ لُغَةً كُلُّ مُسْتَقْذَرٍ وَشَرْعًا مُسْتَقْذَرٌ يَمْنَعُ صِحَّةَ الصَّلَاةِ حَيْثُ لَا مُرَخِّصَ. وَتَجِبُ إِزَالَتُهَا عِنْدَ الصَّلَاةِ وَاسْتِعْمَالِ شَيْءٍ فِيهِ النَّجَاسَةُ.</p>
<div class="section-head">(أ) النجاسة من الجماد</div>
<p><strong>١. كُلُّ مُسْكِرٍ مَائِعٍ</strong> — كَالْخَمْرِ وَهِيَ الْمُتَّخَذَةُ مِنَ الْعِنَبِ، وَنَبِيذٍ وَغَيْرِهِ.</p>
<div class="section-head">(ب) النجاسة من الحيوان</div>
<p><strong>٢. الْكَلْبُ وَالْخِنْزِيرُ</strong> — وَفِي حُكْمِهِمَا كُلُّ فَرْعٍ مِنْهُمَا. فَلَوْ نَزَا كَلْبٌ أَوْ خِنْزِيرٌ عَلَى آدَمِيَّةٍ فَوَلَدَتْ آدَمِيًّا فَهُوَ نَجِسٌ.</p>
<div class="section-head">(ج) النجاسة من الفضلات</div>
<ul>
<li><strong>٣. الْمَيْتَةُ</strong> — لِغَيْرِ بَشَرٍ وَسَمَكٍ وَجَرَادٍ وَصَيْدٍ لَمْ تُدْرَكْ ذَكَاتُهُ.</li>
<li><strong>٤. الرَّوْثُ وَالْبَوْلُ</strong> — وَلَوْ مِنْ مَأْكُولٍ حَيًّا.</li>
<li><strong>٥. الْمَذْيُ وَالْوَدْيُ</strong>.</li>
<li><strong>٦. الدَّمُ وَالصَّدِيدُ</strong> — أُسْتُثْنِيَ الْكَبِدُ وَالطِّحَالُ.</li>
<li><strong>٧. قَيْءُ مَعِدَةٍ وَجِرَّةُ بَهِيمَةٍ</strong>.</li>
<li><strong>٨. الْمِرَّةُ وَسُمُّ الْهَوَامِّ</strong>.</li>
</ul>
<div class="section-head">إزالة النجاسة</div>
<p>تَطْهِيرُ النَّجَاسَةِ بِإِزَالَةِ عَيْنِهَا وَأَثَرِهَا. وَطُهِّرَ بِالْمَاءِ الطَّهُورِ. وَنَجَاسَةُ الْكَلْبِ تَطْهِيرُهَا بِسَبْعِ غَسَلَاتٍ إِحْدَاهُنَّ بِالتُّرَابِ.</p>`

    content: `<p>لِكُلِّ صَلَاةٍ وَقْتٌ أَوَّلُ وَوَقْتٌ مُخْتَارٌ وَوَقْتُ ضَرُورَةٍ.</p>
<div class="section-head">وقت الظهر</div>
<p>مِنَ الزَّوَالِ إِلَى أَنْ يَصِيرَ ظِلُّ كُلِّ شَيْءٍ مِثْلَهُ سِوَى ظِلِّ الزَّوَالِ.</p>
<div class="section-head">وقت العصر</div>
<p>مِنْ مَصِيرِ الظِّلِّ مِثْلَيْهِ إِلَى غُرُوبِ الشَّمْسِ. وَوَقْتُ الاخْتِيَارِ إِلَى اصْفِرَارِ الشَّمْسِ.</p>
<div class="section-head">وقت المغرب</div>
<p>مِنَ الْغُرُوبِ إِلَى مَغِيبِ الشَّفَقِ الأَحْمَرِ.</p>
<div class="section-head">وقت العشاء</div>
<p>مِنْ مَغِيبِ الشَّفَقِ الأَحْمَرِ إِلَى الْفَجْرِ الصَّادِقِ. وَوَقْتُ الاخْتِيَارِ إِلَى ثُلُثِ اللَّيْلِ.</p>
<div class="section-head">وقت الصبح</div>
<p>مِنَ الْفَجْرِ الصَّادِقِ إِلَى طُلُوعِ الشَّمْسِ. وَوَقْتُ الاخْتِيَارِ أَوَّلُهُ.</p>
<div class="section-head">ستر العورة</div>
<p>عَوْرَةُ الرَّجُلِ مَا بَيْنَ السُّرَّةِ وَالرُّكْبَةِ. وَعَوْرَةُ الْمَرْأَةِ الْحُرَّةِ جَمِيعُ بَدَنِهَا إِلَّا الْوَجْهَ وَالْكَفَّيْنِ فِي الصَّلَاةِ. وَعَوْرَةُ الأَمَةِ كَعَوْرَةِ الرَّجُلِ.</p>
<div class="section-head">أوقات تحرم فيها الصلاة</div>
<p>خَمْسَةُ أَوْقَاتٍ يُحَرَّمُ فِيهَا ابْتِدَاءُ النَّفْلِ: بَعْدَ صَلَاةِ الصُّبْحِ حَتَّى تَرْتَفِعَ الشَّمْسُ، وَعِنْدَ قِيَامِ الشَّمْسِ حَتَّى تَزُولَ، وَبَعْدَ الْعَصْرِ حَتَّى تَغْرُبَ، وَعِنْدَ الْغُرُوبِ حَتَّى يَتِمَّ، وَعِنْدَ الطُّلُوعِ حَتَّى تَرْتَفِعَ.</p>`

    content: `<p>الأَذَانُ إِعْلَامٌ بِدُخُولِ وَقْتِ الصَّلَاةِ بِأَلْفَاظٍ مَخْصُوصَةٍ. وَالإِقَامَةُ إِعْلَامٌ بِالشُّرُوعِ فِيهَا.</p>
<div class="section-head">فضل الأذان</div>
<p>قَالَ رَسُولُ اللهِ صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ: لَوْ يَعْلَمُ النَّاسُ مَا فِي النِّدَاءِ وَالصَّفِّ الأَوَّلِ ثُمَّ لَمْ يَجِدُوا إِلَّا أَنْ يَسْتَهِمُوا عَلَيْهِ لَاسْتَهَمُوا.</p>
<div class="section-head">شروط الأذان والإقامة</div>
<ol>
<li>الإِسْلَامُ.</li>
<li>الذُّكُورَةُ — فَلَا يَصِحُّ أَذَانُ الْمَرْأَةِ وَالْخُنْثَى لِلرِّجَالِ.</li>
<li>الْعَقْلُ.</li>
<li>النِّيَّةُ.</li>
<li>الصَّوْتُ الْمُسْمِعُ.</li>
<li>التَّرْتِيبُ.</li>
<li>الْمُوَالَاةُ.</li>
<li>دُخُولُ الْوَقْتِ — فَلَا يَصِحُّ الأَذَانُ قَبْلَ الْوَقْتِ إِلَّا لِلصُّبْحِ.</li>
</ol>
<div class="section-head">سنن الأذان والإقامة</div>
<p>مِنْ سُنَنِ الأَذَانِ: الطَّهَارَةُ، وَاسْتِقْبَالُ الْقِبْلَةِ، وَالْوُقُوفُ، وَوَضْعُ الإِصْبَعَيْنِ فِي الأُذُنَيْنِ، وَالتَّرْتِيلُ فِي الأَذَانِ وَالْحَدْرُ فِي الإِقَامَةِ.</p>
<div class="section-head">آداب سماعهما</div>
<p>يُسَنُّ لِمَنْ سَمِعَ الأَذَانَ أَنْ يُجِيبَ الْمُؤَذِّنَ بِمِثْلِ مَا يَقُولُ إِلَّا فِي الْحَيْعَلَتَيْنِ فَيَقُولُ: لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللهِ.</p>`

    content: `<p>أَرْكَانُ الصَّلَاةِ سَبْعَةَ عَشَرَ رُكْنًا:</p>
<div class="section-head">الأركان</div>
<ol>
<li><strong>النِّيَّةُ</strong> — وَيَجِبُ اقْتِرَانُهَا بِتَكْبِيرَةِ الإِحْرَامِ.</li>
<li><strong>تَكْبِيرَةُ الإِحْرَامِ</strong> — وَأَقَلُّهَا: اللهُ أَكْبَرُ.</li>
<li><strong>الْقِيَامُ لِلْقَادِرِ فِي فَرْضٍ</strong>.</li>
<li><strong>قِرَاءَةُ الْفَاتِحَةِ</strong> — فِي كُلِّ رَكْعَةٍ.</li>
<li><strong>الرُّكُوعُ</strong> — وَأَقَلُّهُ أَنْ يَنْحَنِيَ حَتَّى تَبْلُغَ رَاحَتَاهُ رُكْبَتَيْهِ.</li>
<li><strong>الطُّمَأْنِينَةُ فِي الرُّكُوعِ</strong>.</li>
<li><strong>الاعْتِدَالُ</strong> — الرَّفْعُ مِنَ الرُّكُوعِ.</li>
<li><strong>الطُّمَأْنِينَةُ فِي الاعْتِدَالِ</strong>.</li>
<li><strong>السُّجُودُ مَرَّتَيْنِ</strong> — وَأَقَلُّهُ وَضْعُ بَعْضِ الْجَبْهَةِ عَلَى مَا يُصَلَّى عَلَيْهِ.</li>

<li><strong>الْجُلُوسُ بَيْنَ السَّجْدَتَيْنِ</strong>.</li>
<li><strong>الطُّمَأْنِينَةُ فِيهِ</strong>.</li>
<li><strong>التَّشَهُّدُ الأَخِيرُ</strong>.</li>
<li><strong>الصَّلَاةُ عَلَى النَّبِيِّ ﷺ بَعْدَهُ</strong>.</li>
<li><strong>الْقُعُودُ لِلتَّشَهُّدِ وَالصَّلَاةِ</strong>.</li>

<div class="section-head">الطمأنينة</div>
<p>الطُّمَأْنِينَةُ هِيَ السُّكُونُ وَإِنْ قَلَّ بَعْدَ الْحَرَكَةِ. وَهِيَ رُكْنٌ فِي الرُّكُوعِ وَالاعْتِدَالِ وَالسُّجُودِ وَالْجُلُوسِ بَيْنَ السَّجْدَتَيْنِ.</p>`

let currentPage = null;
let allItems = tocData.flatMap(s => s.items);
let filteredItems = [...allItems];

function buildToc(items) {
  const list = document.getElementById('toc-list');
  if (items === null) {
    list.innerHTML = tocData.map(section => `
      <div class="toc-section">
        <div class="toc-section-title">${section.section}</div>
        ${section.items.map(item => `
          <button class="toc-item${currentPage === item.page ? ' active' : ''}" onclick="loadPage('${item.page}')">
            ${item.label}
            <span class="page-num">ص${item.num}</span>
          </button>
        `).join('')}
      </div>
    `).join('');
  } else {
    list.innerHTML = items.map(item => `
      <button class="toc-item${currentPage === item.page ? ' active' : ''}" onclick="loadPage('${item.page}')">
        ${item.label}
        <span class="page-num">ص${item.num}</span>
      </button>
    `).join('') || '<div style="padding:14px;color:#8a6a4a;font-size:13px;text-align:center;">لا نتائج</div>';
  }
}

function filterToc(val) {
  if (!val.trim()) { filteredItems = [...allItems]; buildToc(null); return; }
  filteredItems = allItems.filter(i => i.label.includes(val.trim()));
  buildToc(filteredItems);
}

function wrapWords(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  function processNode(node) {
    if (node.nodeType === 3) {
      const words = node.textContent.split(/(\s+)/);
      const frag = document.createDocumentFragment();
      words.forEach(w => {
        if (/\s+/.test(w)) { frag.appendChild(document.createTextNode(w)); return; }
        const clean = w.replace(/[،؛:.،\(\)]/g, '');
        const span = document.createElement('span');
        span.className = 'ar-word' + (glossary[clean] ? ' glossed' : '');
        if (glossary[clean]) { span.dataset.key = clean; }
        span.textContent = w;
        frag.appendChild(span);
      });
      node.parentNode.replaceChild(frag, node);
    } else if (node.nodeType === 1 && !['STRONG','EM'].includes(node.tagName)) {
      Array.from(node.childNodes).forEach(processNode);
    }
  }
  Array.from(div.childNodes).forEach(processNode);
  return div.innerHTML;
}

function loadPage(id) {
  const page = pages.find(p => p.id === id);
  if (!page) return;
  currentPage = id;
  buildToc(filteredItems.length < allItems.length ? filteredItems : null);
  const idx = allItems.findIndex(i => i.page === id);
  const content = document.getElementById('content');
  content.innerHTML = `
    <div id="page-header">
      <div id="page-title">${page.title}</div>
      <div id="page-meta">${page.meta}</div>
    </div>
    <div id="page-text">${wrapWords(page.content)}</div>
    <div id="glossary-key">
      <strong>تلميح:</strong> الكلمات ذات الخط المنقط باللون البني تحتوي على معنى — ضع المؤشر عليها لتظهر الترجمة الإنجليزية.
    </div>
    <div id="nav-bar">
      <button class="nav-btn" onclick="navigate(-1)" ${idx <= 0 ? 'disabled' : ''}>→ السابق</button>
      <span id="page-counter">${idx + 1} / ${allItems.length}</span>
      <button class="nav-btn" onclick="navigate(1)" ${idx >= allItems.length - 1 ? 'disabled' : ''}>التالي ←</button>
    </div>
  `;
  document.getElementById('page-text').addEventListener('mouseover', showTip);
  document.getElementById('page-text').addEventListener('mousemove', moveTip);
  document.getElementById('page-text').addEventListener('mouseout', hideTip);
  content.scrollTop = 0;
  window.scrollTo(0, 0);
}

function navigate(dir) {
  const idx = allItems.findIndex(i => i.page === currentPage);
  const next = allItems[idx + dir];
  if (next) loadPage(next.page);
}

const tooltip = document.getElementById('tooltip');
function showTip(e) {
  const t = e.target.closest('.glossed');
  if (t && t.dataset.key) {
    const [word, meaning] = glossary[t.dataset.key];
    document.getElementById('t-word').textContent = word;
    document.getElementById('t-meaning').textContent = meaning;
    tooltip.style.display = 'block';
  }
}
function moveTip(e) {
  if (tooltip.style.display === 'block') {
    let x = e.clientX + 14, y = e.clientY - 50;
    if (x + 270 > window.innerWidth) x = e.clientX - 280;
    if (y < 10) y = e.clientY + 20;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }
}
function hideTip(e) {
  const t = e.target.closest('.glossed');
  if (t) tooltip.style.display = 'none';
}

buildToc(null);
</script>
</body>
</html>
